<!DOCTYPE html>
<html>
<head>
  <title>AI Travel Agent</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { padding: 10px; margin: 5px; }
    textarea { width: 100%; height: 350px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-top: 15px; }
  </style>
</head>
<body>

<h2>🌍 AI Travel Planner</h2>

<input type="text" id="userInput" placeholder="Plan Goa trip for 3 days">
<button onclick="planTrip()">Plan Trip</button>

<div class="box">
  <h3>🧠 Itinerary</h3>
  <textarea id="output"></textarea>
</div>

<hr>

<h3>💰 Expense Tracker</h3>

<input type="text" id="purpose" placeholder="What for?">
<input type="text" id="person" placeholder="Who paid?">
<input type="number" id="amount" placeholder="Amount">

<button onclick="addExpense()">Add</button>

<div class="box" id="expenses"></div>

<script>
async function planTrip() {
  const input = document.getElementById("userInput").value;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: input })
  });

  const data = await res.json();

  document.getElementById("output").value = data.itinerary;
}

async function addExpense() {
  const purpose = document.getElementById("purpose").value;
  const person = document.getElementById("person").value;
  const amount = parseInt(document.getElementById("amount").value);

  await fetch("/add_expense", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ purpose, person, amount })
  });

  loadExpenses();
}

async function loadExpenses() {
  const res = await fetch("/get_expenses");
  const data = await res.json();

  let html = "<h4>Expenses:</h4>";

  data.expenses.forEach(e => {
    html += `<p>${e.person} spent ₹${e.amount} on ${e.purpose}</p>`;
  });

  html += `<h4>Total: ₹${data.total}</h4>`;

  document.getElementById("expenses").innerHTML = html;
}
</script>

</body>
</html>
